stages:
  - test
  - build
  - verify

variables:
  DOCKER_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  DOCKER_LATEST: $CI_REGISTRY_IMAGE:latest

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ── Test Stage ──────────────────────────────────────────────────────

test:python:
  stage: test
  image: python:3.12-slim
  script:
    - pip install --no-cache-dir -r requirements.txt
    - python -m pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml --junitxml=report.xml
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
      junit: report.xml
    paths:
      - coverage.xml
      - report.xml
    expire_in: 30 days

test:docker-build:
  stage: test
  image: docker:27-dind
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY 2>/dev/null || true
  script:
    - docker build -t feiertage-test .
    - docker run --rm feiertage-test python -m pytest tests/ -v --cov=app --cov-report=term-missing

# ── Build & Push Stage ───────────────────────────────────────────────

build:docker:
  stage: build
  image: docker:27-dind
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "/certs/client"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $DOCKER_IMAGE -t $DOCKER_LATEST .
    - docker push $DOCKER_IMAGE
    - docker push $DOCKER_LATEST
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG

# ── Verify Stage ─────────────────────────────────────────────────────

verify:api:
  stage: verify
  image: python:3.12-slim
  needs:
    - test:python
  script:
    - pip install --no-cache-dir fastapi uvicorn httpx
    - |
      uvicorn app.main:app --host 0.0.0.0 --port 8000 &
      sleep 3
      python -c "
      import httpx, sys
      r = httpx.get('http://localhost:8000/api/region/Bayern?year=2016')
      assert r.status_code == 200, f'Status {r.status_code}'
      assert r.json()['count'] == 12, f'Count {r.json()[\"count\"]} != 12'
      r = httpx.get('http://localhost:8000/api/easter?year=2026')
      assert r.json()['date'] == '2026-04-05'
      r = httpx.get('http://localhost:8000/api/feiertage/2025-12-25')
      assert r.status_code == 200
      names = [f['name'] for f in r.json()['feiertage']]
      assert 'Weihnachten' in names or 'Christtag' in names
      r = httpx.get('http://localhost:8000/docs')
      assert r.status_code == 200
      r = httpx.get('http://localhost:8000/openapi.json')
      assert r.status_code == 200
      print('All API verification checks passed')
      "
